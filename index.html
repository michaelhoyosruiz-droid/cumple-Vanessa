<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños 💖</title>

<style>

/* ====== ESTILO GENERAL ====== */
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#ff9a9e,#fad0c4,#fad0c4);
    overflow:hidden;
}

/* ====== ANIMACIÓN DE FONDO ====== */
body::before{
    content:"";
    position:absolute;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(255,255,255,0.3) 2px, transparent 3px);
    background-size:40px 40px;
    animation: mover 20s linear infinite;
}

@keyframes mover{
    from{transform:translate(0,0);}
    to{transform:translate(-200px,-200px);}
}

/* ====== TARJETA ====== */
.card{
    position:relative;
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:350px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation: aparecer 1.5s ease;
}

@keyframes aparecer{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ====== TEXTO ====== */
h1{
    color:#ff4d6d;
    margin-bottom:10px;
}

p{
    color:#555;
    font-size:16px;
}

/* ====== BOTÓN ====== */
button{
    margin-top:20px;
    padding:12px 20px;
    border:none;
    border-radius:25px;
    background:#ff4d6d;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#ff1e4d;
    transform:scale(1.05);
}

/* ====== CORAZONES ====== */
.heart{
    position:absolute;
    color:#ff4d6d;
    font-size:20px;
    animation: flotar 6s linear infinite;
}

@keyframes flotar{
    from{
        transform:translateY(0);
        opacity:1;
    }
    to{
        transform:translateY(-600px);
        opacity:0;
    }
}

</style>
</head>

<body>

<div class="card">
    <h1>🎉 ¡Feliz Cumpleaños! 🎂</h1>

    <p>
        Querida mejor amiga 💖<br><br>
        Hoy celebramos tu vida, tu sonrisa y todos los momentos
        increíbles que compartimos.  
        Gracias por existir y por ser una persona tan especial.
    </p>

    <button onclick="mostrarMensaje()">Haz clic aquí ✨</button>

    <p id="extra"></p>
</div>

<script>

function mostrarMensaje(){
    document.getElementById("extra").innerHTML =
    "💫 Eres una persona increíble y siempre contarás conmigo. ¡Te quiero mucho! 💕";
}

/* Crear corazones flotantes */
setInterval(()=>{
    const heart = document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="💖";
    heart.style.left=Math.random()*100+"vw";
    heart.style.bottom="0px";
    document.body.appendChild(heart);

    setTimeout(()=>heart.remove(),6000);
},500);

</script>

</body>
</html>
